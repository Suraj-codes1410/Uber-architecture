server:
  port: 8083

spring:
  application:
    name: ride-service

  #Database
  datasource:
    url: jdbc:mysql://localhost:3306/uberapp
    username : root
    password : root
    driver-class-name: com.mysql.cj.jdbc.Driver
#JPA
  jpa:
    hibernate:
      ddl-auto : update
    show-sql: true
    properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQLDialect

#kafka properties
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

#Actuator
management:
  endpoints:
    web:
      exposure:
        include: health ,info
